spring:
  application:
    name: jobradar
  
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

tinyfish:
  api:
    base-url: https://agent.tinyfish.ai/v1/automation
    key: ${TINYFISH_API_KEY}
    timeout: 60
  linkedin:
    url: https://www.linkedin.com/jobs/search/?keywords=java&location=Bengaluru%2C%20Karnataka%2C%20India&f_TPR=r86400&f_E=2&sortBy=DD
    goal: "Wait for all job cards to load on this LinkedIn jobs page. Look at only the first 5 job cards. These are the most recent Java Backend Developer jobs for candidates with 1-2 years experience. For each of the 5 jobs extract: job_title, company_name, location, experience_required, salary (or 'Not disclosed'), skills, job_url (full URL starting with https://www.linkedin.com/jobs/view/), source = 'LinkedIn'. Only Java Backend roles. Skip frontend or unrelated roles. Return ONLY a JSON array of 5 objects. No explanation."

mail:
  to: ${MAIL_TO}
  subject: "Software Engineering Jobs (Last 24 Hours)"

scheduler:
  enabled: ${SCHEDULER_ENABLED:true}
  cron: "0 0 9 * * ?"

logging:
  level:
    com.jobradar: INFO
    org.springframework.mail: DEBUG