spring:
  application:
    name: jobradar
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

tinyfish:
  api:
    base-url: https://agent.tinyfish.ai/v1/automation
    key: ${TINYFISH_API_KEY}
    timeout: 60
  linkedin:
    url: https://www.linkedin.com/jobs/search/?keywords=java&location=Bengaluru%2C%20Karnataka%2C%20India&f_TPR=r86400&f_E=2&sortBy=DD
    goal: "Wait for job cards to load. Extract top 5 Java backend jobs in Bengaluru. Return JSON array with job_title, company_name, location, experience_required, salary, skills, job_url, source."

mail:
  to: ${MAIL_TO}
  subject: "Java Backend Jobs (Last 24 Hours)"

scheduler:
  enabled: ${SCHEDULER_ENABLED:true}
  cron: "0 0 9 * * ?"

logging:
  level:
    com.jobradar: INFO
    org.springframework.mail: DEBUG